services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openenterprise_twin
      POSTGRES_USER: openenterprise_twin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U openenterprise_twin -d openenterprise_twin
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
