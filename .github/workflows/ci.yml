name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, type and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install -e './backend[dev]'
      - name: Lint
        working-directory: backend
        run: python -m ruff check src tests
      - name: Type and boundary checks
        working-directory: backend
        run: |
          python -m mypy src
          lint-imports
      - name: Unit tests
        working-directory: backend
        run: |
          mkdir -p test-results
          python -m pytest tests/unit -q --junitxml=test-results/backend-unit.xml
      - name: Upload failed backend report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-failure-report
          path: backend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  postgres-integration:
    name: PostgreSQL migration and API integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openenterprise_twin
          POSTGRES_USER: openenterprise_twin
          POSTGRES_PASSWORD: openenterprise_twin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openenterprise_twin -d openenterprise_twin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      OPENENTERPRISE_TWIN_DATABASE_URL: postgresql+psycopg://openenterprise_twin:openenterprise_twin@127.0.0.1:5432/openenterprise_twin
      OPENENTERPRISE_TWIN_TEST_POSTGRES_URL: postgresql+psycopg://openenterprise_twin:openenterprise_twin@127.0.0.1:5432/openenterprise_twin
      OPENENTERPRISE_TWIN_ARTIFACT_DIRECTORY: artifacts
      OPENENTERPRISE_TWIN_EXPERIMENT_WORKERS: "1"
      OPENENTERPRISE_TWIN_REPLICATION_WORKERS_PER_EXPERIMENT: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install -e './backend[dev]'
      - name: Apply reversible migration
        working-directory: backend
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head
      - name: Seed Northstar and verify PostgreSQL-backed API
        run: |
          mkdir -p backend/test-results
          cd backend
          python -m openenterprise_twin.cli.demo seed
          python -m uvicorn openenterprise_twin.api.app:create_app \
            --factory --host 127.0.0.1 --port 8000 \
            >test-results/postgres-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              cat test-results/postgres-api.log
              exit 1
            fi
            sleep 1
          done
          python -c "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/v1/scenarios/current-plan')); assert payload['company_model_version'] == '0.2.0'"
      - name: API integration tests
        working-directory: backend
        run: |
          mkdir -p test-results
          python -m pytest tests/integration -q --junitxml=test-results/backend-integration.xml
      - name: Upload failed integration report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-integration-failure-report
          path: backend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend lint, type, unit tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint and typecheck
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck
      - name: Unit tests
        working-directory: frontend
        run: |
          mkdir -p test-results
          npm run test -- --run --reporter=default --reporter=junit --outputFile=test-results/vitest.xml
      - name: Production build
        working-directory: frontend
        run: npm run build
      - name: Upload failed frontend report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-failure-report
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  containers:
    name: Production container images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: |
          docker build --file backend/Dockerfile --tag openenterprise-twin-api:ci backend
          docker build --file frontend/Dockerfile --tag openenterprise-twin-web:ci frontend

  e2e:
    name: End-to-end release gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, postgres-integration, frontend, containers]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openenterprise_twin
          POSTGRES_USER: openenterprise_twin
          POSTGRES_PASSWORD: openenterprise_twin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openenterprise_twin -d openenterprise_twin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      OPENENTERPRISE_TWIN_DATABASE_URL: postgresql+psycopg://openenterprise_twin:openenterprise_twin@127.0.0.1:5432/openenterprise_twin
      OPENENTERPRISE_TWIN_ARTIFACT_DIRECTORY: artifacts
      OPENENTERPRISE_TWIN_EXPERIMENT_WORKERS: "1"
      OPENENTERPRISE_TWIN_REPLICATION_WORKERS_PER_EXPERIMENT: "1"
      OPENENTERPRISE_TWIN_CORS_ALLOWED_ORIGINS: '["http://127.0.0.1:4173"]'
      LIVE_E2E: "1"
      VITE_API_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install application and browser
        run: |
          python -m pip install -e './backend[dev]'
          cd frontend
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright
        run: |
          mkdir -p test-results
          cd backend
          python -m alembic upgrade head
          python -m openenterprise_twin.cli.demo seed
          python -m uvicorn openenterprise_twin.api.app:create_app \
            --factory --host 127.0.0.1 --port 8000 \
            >../test-results/e2e-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              cat ../test-results/e2e-api.log
              exit 1
            fi
            sleep 1
          done
          cd ../frontend
          npm run e2e
      - name: Upload failed E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
